media: media
content:
  - name: posts
    label: Posts
    type: collection
    path: _posts
    view:
      fields: [ title ]
    fields:
      - { name: layout, type: string, hidden: true, default: alumni }
      - { name: image, label: Bio image, type: image }
      - { name: title, label: Title, type: string, required: true }
      - { name: body, label: Body, type: rich-text }
